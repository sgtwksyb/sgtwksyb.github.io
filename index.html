<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>とりのポートフォリオ</title>
    <style>
        /* 全体の基本設定 */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #ffffff;
            color: #333333;
            margin: 0;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            /* 👇 ズーム禁止をさらに確実にするCSS（ダブルタップズーム等を抑制） */
            touch-action: manipulation;
        }

        /* ヘッダー（アイコンとSNS） */
        .header {
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 800px;
            gap: 20px;
            margin-bottom: 30px;
            padding: 0 20px;
            box-sizing: border-box;
        }
        .profile-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 0px solid #333;
        }
        .profile-info h1 {
            margin: 0 0 5px 0;
            font-size: 18px;
            font-weight: 300;
        }
        .sns-links a {
            margin-right: 15px;
            color: #0066cc;
            text-decoration: none;
            font-size: 13px;
            font-weight: 300;
        }

        /* タブ・ボタン共通のコンテナ */
        .tabs-container {
            width: 100%;
            max-width: 800px;
            position: relative;
        }
        .tabs {
            display: flex;
            justify-content: center;
            border-bottom: 0px solid #eeeeee;
            margin-bottom: 20px;
        }
        .tab-btn {
            background: none;
            border: none;
            font-size: 24px;
            padding: 10px 40px;
            cursor: pointer;
            position: relative;
            opacity: 0.4;
            transition: opacity 0.3s;
        }
        .tab-btn.active {
            opacity: 1;
        }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 0px;
            background-color: #000000;
        }

        /* 👇 2. 戻るボタンを画面上部に固定する設定 */
        .back-btn {
            display: none;
            position: fixed;        /* 画面に固定 */
            left: 0;
            top: 0;
            width: 100%;            /* 横幅いっぱいのバーにする */
            background-color: rgba(255, 255, 255, 0.95); /* 背景を白（少しだけ透けさせる） */
            border: none;
            border-bottom: 1px solid #eeeeee;
            font-size: 16px;
            cursor: pointer;
            font-weight: 300;
            padding: 15px 20px;     /* 押しやすいように内側に広めの余白 */
            text-align: left;       /* 文字を左寄せに */
            z-index: 1000;          /* 画像より手前に表示 */
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); /* ほんのり影をつけて立体感を出す */
        }

        /* ギャラリー部分（全体コンテナ） */
        .gallery-container {
            width: 100%;
            max-width: 100%;
        }

        /* ① 一覧モード（タイル状に並ぶ） */
        .list-view {
            display: none;
            gap: 0;
            grid-template-columns: repeat(3, 1fr);
        }
        .list-view.active {
            display: grid;
        }
        @media (min-width: 768px) {
            .list-view {
                grid-template-columns: repeat(5, 1fr);
            }
        }
        .gallery-item {
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            background-color: #f5f5f5;
            cursor: pointer;
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }
        .gallery-item img:hover {
            transform: scale(1.05);
        }

        /* ② 詳細モード */
        .detail-view {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding-top: 50px; /* 👇 戻るボタンのバーと被らないように上に隙間をあける */
        }
        .detail-view.active {
            display: flex;
        }
        .detail-item {
            width: 100%;
            max-width: 600px;
            margin-bottom: 20px;
            background-color: #ffffff;
        }
        .detail-item img {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <div class="header">
        <img class="profile-icon" src="アイコン用アメタマJPG.JPG" alt="アイコン">
        <div class="profile-info">
            <h1>とり</h1>
            <div class="sns-links">
                <a href="#" target="_blank">X: @ID</a>
                <a href="#" target="_blank">pixiv: ID</a>
            </div>
        </div>
    </div>

    <div class="tabs-container">
        <button id="back-btn" class="back-btn" onclick="showListView()">← back</button>
        <div id="tabs-menu" class="tabs">
            <button class="tab-btn active" onclick="switchTab('tab-a')">🧸</button>
            <button class="tab-btn" onclick="switchTab('tab-b')">🎨</button>
            <button class="tab-btn" onclick="switchTab('tab-c')">🔪</button>
        </div>
    </div>

    <div class="gallery-container">

        <div id="list-tab-a" class="list-view active">
            <div class="gallery-item" onclick="showDetailView('detail-tab-a', 0)"><img src="patirisutohakama.PNG" alt="作品"></div>
            <div class="gallery-item" onclick="showDetailView('detail-tab-a', 1)"><img src="pickp_nuoh.JPG" alt="作品"></div>
        </div>

        <div id="list-tab-b" class="list-view">
            <div class="gallery-item" onclick="showDetailView('detail-tab-b', 0)"><img src="sg_sketch.png" alt="作品"></div>
            <div class="gallery-item" onclick="showDetailView('detail-tab-b', 1)"><img src="水濡れ乾.PNG" alt="作品"></div>
        </div>

        <div id="list-tab-c" class="list-view">
            <div class="gallery-item" onclick="showDetailView('detail-tab-c', 0)"><img src="手持ち燭台と夜.jpg" alt="作品"></div>
            <div class="gallery-item" onclick="showDetailView('detail-tab-c', 1)"><img src="工場夜景とモクロー.JPG" alt="作品"></div>
        </div>

        <div id="detail-tab-a" class="detail-view">
            <div class="detail-item" id="img-tab-a-0"><img src="patirisutohakama.PNG" alt="作品"></div>
            <div class="detail-item" id="img-tab-a-1"><img src="pickp_nuoh.JPG" alt="作品"></div>
        </div>

        <div id="detail-tab-b" class="detail-view">
            <div class="detail-item" id="img-tab-b-0"><img src="sg_sketch.png" alt="作品"></div>
            <div class="detail-item" id="img-tab-b-1"><img src="水濡れ乾.PNG" alt="作品"></div>
        </div>

        <div id="detail-tab-c" class="detail-view">
            <div class="detail-item" id="img-tab-c-0"><img src="手持ち燭台と夜.jpg" alt="作品"></div>
            <div class="detail-item" id="img-tab-c-1"><img src="工場夜景とモクロー.JPG" alt="作品"></div>
        </div>

    </div>

    <script>
        let currentTab = 'tab-a'; 
        let isDetailMode = false; // 👇 今、詳細モードかどうかのフラグ
        
        // 👇 スワイプ検知用の変数
        let touchStartX = 0;
        let touchStartY = 0;

        // タブを切り替える
        function switchTab(tabId) {
            currentTab = tabId;
            
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.list-view').forEach(content => content.classList.remove('active'));

            const clickedBtn = event.currentTarget;
            clickedBtn.classList.add('active');

            document.getElementById('list-' + tabId).classList.add('active');
        }

        // 詳細モードに切り替える
        function showDetailView(detailTabId, imgIndex) {
            isDetailMode = true; // 詳細モードON
            
            document.querySelectorAll('.list-view').forEach(content => content.classList.remove('active'));
            document.getElementById('tabs-menu').style.display = 'none';
            document.getElementById('back-btn').style.display = 'block';

            const detailView = document.getElementById(detailTabId);
            detailView.classList.add('active');

            const targetImg = document.getElementById('img-' + detailTabId.replace('detail-', '') + '-' + imgIndex);
            if (targetImg) {
                targetImg.scrollIntoView({ behavior: 'auto', block: 'center' });
            }
        }

        // 一覧モードに戻る
        function showListView() {
            isDetailMode = false; // 詳細モードOFF
            
            document.querySelectorAll('.detail-view').forEach(content => content.classList.remove('active'));
            document.getElementById('back-btn').style.display = 'none';
            document.getElementById('tabs-menu').style.display = 'flex';

            document.getElementById('list-' + currentTab).classList.add('active');
        }

        // ==================== 3. 左から右へのスワイプ戻り機能 ====================
        window.addEventListener('touchstart', function(e) {
            if (!isDetailMode) return; // 詳細モードのときだけ動かす
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, {passive: true});

        window.addEventListener('touchend', function(e) {
            if (!isDetailMode) return;

            let touchEndX = e.changedTouches[0].clientX;
            let touchEndY = e.changedTouches[0].clientY;

            let diffX = touchEndX - touchStartX;
            let diffY = touchEndY - touchStartY;

            // 左右のスワイプ量が上下より多く、かつ左から右へ「50ピクセル以上」スワイプされたら実行
            if (diffX > 50 && Math.abs(diffX) > Math.abs(diffY)) {
                showListView();
            }
        }, {passive: true});
    </script>

</body>
</html>
