<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="apple-touch-icon" href="アイコン用アメタマJPG.JPG">
    <title>アーカイブ</title>
    <style>
        /* ==========================================
           基本設定（ライトモード用）
           ========================================== */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #ffffff;
            color: #333333;
            margin: 0;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        /* ヘッダー */
        .header {
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 800px;
            gap: 20px;
            margin-bottom: 30px;
            padding: 0 20px;
            box-sizing: border-box;
        }
        .profile-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 0px solid #333;
        }
        .profile-info h1 {
            margin: 0 0 5px 0;
            font-size: 18px;
            font-weight: 300;
        }
        .sns-links a {
            margin-right: 15px;
            color: #0066cc;
            text-decoration: none;
            font-size: 13px;
            font-weight: 300;
        }

        /* タブ・ボタン共通 */
        .tabs-container {
            width: 100%;
            max-width: 800px;
            position: relative;
        }
        .tabs {
            display: flex;
            justify-content: center;
            border-bottom: 0px solid #eeeeee;
            margin-bottom: 20px;
        }
        .tab-btn {
            background: none;
            border: none;
            font-size: 24px;
            padding: 10px 20px;     /* 👈 スマホ用に左右の余白を40pxから20pxに縮めて画面内に収める */
            flex-grow: 1;           /* 👈 4つのボタンが画面幅に等間隔できれいに広がるように設定 */
            max-width: 100px;       /* ボタンが広がりすぎないように制限 */
            cursor: pointer;
            position: relative;
            opacity: 0.4;
            transition: opacity 0.3s;
        }
        .tab-btn.active {
            opacity: 1;
        }

        /* PCやタブレットなど、画面が広い時は少し余裕を持たせる */
        @media (min-width: 768px) {
            .tab-btn {
                padding: 10px 40px;
                flex-grow: 0;
            }
        }

        /* 戻るボタン（画面上部に固定） */
        .back-btn {
            display: none;
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.95);
            border: none;
            border-bottom: 1px solid #eeeeee;
            font-size: 16px;
            cursor: pointer;
            font-weight: 300;
            padding: 15px 20px;
            text-align: left;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            color: #333333;
        }

        /* ギャラリー部分 */
        .gallery-container {
            width: 100%;
            max-width: 100%;
        }

        /* ① 一覧モード */
        .list-view {
            display: none;
            gap: 0;
            grid-template-columns: repeat(3, 1fr);
        }
        .list-view.active {
            display: grid;
        }
        @media (min-width: 768px) {
            .list-view {
                grid-template-columns: repeat(5, 1fr);
            }
        }
        .gallery-item {
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            background-color: #f5f5f5;
            cursor: pointer;
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }
        .gallery-item img:hover {
            transform: scale(1.05);
        }

        /* ② 詳細モード */
        .detail-view {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding-top: 50px;
        }
        .detail-view.active {
            display: flex;
        }
        .detail-item {
            width: 100%;
            max-width: 600px;
            margin-bottom: 20px;
            background-color: #ffffff;
        }
        .detail-item img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* ==========================================
           ダークモード
           ========================================== */
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #000000;
                color: #ffffff;
            }

            .sns-links a {
                color: #66b3ff;
            }

            .back-btn {
                background-color: rgba(0, 0, 0, 0.95);
                border-bottom: 1px solid #333333;
                color: #ffffff;
                box-shadow: 0 2px 5px rgba(255,255,255,0.05);
            }

            .gallery-item {
                background-color: #1a1a1a;
            }

            .detail-item {
                background-color: #000000;
            }
        }
    </style>
</head>

        const galleryBox = document.getElementById('gallery-box');
        
        Object.keys(artworkData).forEach((tabId, tabIndex) => {
            const isFirst = tabIndex === 0 ? 'active' : '';

            const listView = document.createElement('div');
            listView.id = `list-${tabId}`;
            listView.className = `list-view ${isFirst}`;

            const detailView = document.createElement('div');
            detailView.id = `detail-${tabId}`;
            detailView.className = `detail-view`;

            artworkData[tabId].forEach((imgSrc, imgIndex) => {
                listView.innerHTML += `
                    <div class="gallery-item" onclick="showDetailView('detail-${tabId}', ${imgIndex})">
                        <img src="${imgSrc}" alt="作品">
                    </div>
                `;
                detailView.innerHTML += `
                    <div class="detail-item" id="img-${tabId}-${imgIndex}">
                        <img src="${imgSrc}" alt="作品">
                    </div>
                `;
            });

            galleryBox.appendChild(listView);
            galleryBox.appendChild(detailView);
        });

        // 👈 タブの順番を管理する配列を追加
        const tabOrder = ['tab-a', 'tab-b', 'tab-c', 'tab-d'];
        let currentTab = 'tab-a'; 
        let isDetailMode = false; 
        let touchStartX = 0;
        let touchStartY = 0;

        // 👈 switchTabの引数を省略しても動くように少し強化
        function switchTab(tabId) {
            currentTab = tabId;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.list-view').forEach(content => content.classList.remove('active'));
            
            // ボタンの見た目をアクティブにする処理
            const activeBtn = document.querySelector(`.tab-btn[onclick="switchTab('${tabId}')"]`);
            if (activeBtn) activeBtn.classList.add('active');
            
            document.getElementById('list-' + tabId).classList.add('active');
        }

        function showDetailView(detailTabId, imgIndex) {
            isDetailMode = true;
            document.querySelectorAll('.list-view').forEach(content => content.classList.remove('active'));
            document.getElementById('tabs-menu').style.display = 'none';
            document.getElementById('back-btn').style.display = 'block';

            const detailView = document.getElementById(detailTabId);
            detailView.classList.add('active');

            const targetImg = document.getElementById('img-' + detailTabId.replace('detail-', '') + '-' + imgIndex);
            if (targetImg) {
                targetImg.scrollIntoView({ behavior: 'auto', block: 'center' });
            }
        }

        function showListView() {
            isDetailMode = false;
            document.querySelectorAll('.detail-view').forEach(content => content.classList.remove('active'));
            document.getElementById('back-btn').style.display = 'none';
            document.getElementById('tabs-menu').style.display = 'flex';
            document.getElementById('list-' + currentTab).classList.add('active');
        }

        // ==========================================
        // ✨ タッチ（スワイプ）操作のコントロール
        // ==========================================
        window.addEventListener('touchstart', function(e) {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, {passive: true});

        window.addEventListener('touchend', function(e) {
            let touchEndX = e.changedTouches[0].clientX;
            let touchEndY = e.changedTouches[0].clientY;
            let diffX = touchEndX - touchStartX;
            let diffY = touchEndY - touchStartY;

            // 横方向のスワイプ量が一定以上で、縦揺れが少ない時だけ反応
            if (Math.abs(diffX) > 60 && Math.abs(diffX) > Math.abs(diffY)) {
                if (isDetailMode) {
                    // 【詳細モード時】右スワイプで一覧に戻る
                    if (diffX > 0) {
                        showListView();
                    }
                } else {
                    // 【一覧モード時】左右スワイプでタブをループ切り替え
                    let currentIndex = tabOrder.indexOf(currentTab);
                    
                    if (diffX > 0) {
                        // 👉 右にスワイプ（左のタブへ移動）
                        currentIndex = (currentIndex - 1 + tabOrder.length) % tabOrder.length;
                    } else {
                        // 👈 左にスワイプ（右のタブへ移動）
                        currentIndex = (currentIndex + 1) % tabOrder.length;
                    }
                    
                    switchTab(tabOrder[currentIndex]);
                }
            }
        }, {passive: true});
