<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>とりのポートフォリオ</title>
    <style>
        /* 全体の基本設定 */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #ffffff;
            color: #333333;
            margin: 0;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        /* ヘッダー（アイコンとSNS） */
        .header {
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 800px;
            gap: 20px;
            margin-bottom: 30px;
            padding: 0 20px;
            box-sizing: border-box;
        }
        .profile-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 0px solid #333;
        }
        .profile-info h1 {
            margin: 0 0 5px 0;
            font-size: 18px;
            font-weight: 300;
        }
        .sns-links a {
            margin-right: 15px;
            color: #0066cc;
            text-decoration: none;
            font-size: 13px;
            font-weight: 300;
        }

        /* タブ・ボタン共通のコンテナ */
        .tabs-container {
            width: 100%;
            max-width: 800px;
            position: relative;
        }
        .tabs {
            display: flex;
            justify-content: center;
            border-bottom: 0px solid #eeeeee;
            margin-bottom: 20px;
        }
        .tab-btn {
            background: none;
            border: none;
            font-size: 24px;
            padding: 10px 40px;
            cursor: pointer;
            position: relative;
            opacity: 0.4;
            transition: opacity 0.3s;
        }
        .tab-btn.active {
            opacity: 1;
        }

        /* 戻るボタン（画面上部に固定） */
        .back-btn {
            display: none;
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.95);
            border: none;
            border-bottom: 1px solid #eeeeee;
            font-size: 16px;
            cursor: pointer;
            font-weight: 300;
            padding: 15px 20px;
            text-align: left;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* ギャラリー部分 */
        .gallery-container {
            width: 100%;
            max-width: 100%;
        }

        /* ① 一覧モード */
        .list-view {
            display: none;
            gap: 0;
            grid-template-columns: repeat(3, 1fr);
        }
        .list-view.active {
            display: grid;
        }
        @media (min-width: 768px) {
            .list-view {
                grid-template-columns: repeat(5, 1fr);
            }
        }
        .gallery-item {
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            background-color: #f5f5f5;
            cursor: pointer;
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }
        .gallery-item img:hover {
            transform: scale(1.05);
        }

        /* ② 詳細モード */
        .detail-view {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding-top: 50px;
        }
        .detail-view.active {
            display: flex;
        }
        .detail-item {
            width: 100%;
            max-width: 600px;
            margin-bottom: 20px;
            background-color: #ffffff;
        }
        .detail-item img {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <div class="header">
        <img class="profile-icon" src="アイコン用アメタマJPG.JPG" alt="アイコン">
        <div class="profile-info">
            <h1>とり</h1>
            <div class="sns-links">
                <a href="#" target="_blank">X: @ID</a>
                <a href="#" target="_blank">pixiv: ID</a>
            </div>
        </div>
    </div>

    <div class="tabs-container">
        <button id="back-btn" class="back-btn" onclick="showListView()">← back</button>
        <div id="tabs-menu" class="tabs">
            <button class="tab-btn active" onclick="switchTab('tab-a')">🧸</button>
            <button class="tab-btn" onclick="switchTab('tab-b')">🎨</button>
            <button class="tab-btn" onclick="switchTab('tab-c')">🔪</button>
        </div>
    </div>

    <div class="gallery-container" id="gallery-box"></div>

    <script>
        // ==========================================
        // ✨ ここに画像を1回ずつ登録するだけでOK！ ✨
        // ==========================================
        const artworkData = {
            'tab-a': [
                'patirisutohakama.PNG',
                'pickp_nuoh.JPG'
            ],
            'tab-b': [
                'sg_sketch.png',
                '水濡れ乾.PNG'
            ],
            'tab-c': [
                '手持ち燭台と夜.jpg',
                '工場夜景とモクロー.JPG'
            ]
        };

        // ページを開いた瞬間に、上のデータからHTMLを自動で作り出す仕組み
        const galleryBox = document.getElementById('gallery-box');
        
        Object.keys(artworkData).forEach((tabId, tabIndex) => {
            const isFirst = tabIndex === 0 ? 'active' : '';

            // 一覧モード用の枠を作る
            const listView = document.createElement('div');
            listView.id = `list-${tabId}`;
            listView.className = `list-view ${isFirst}`;

            // 詳細モード用の枠を作る
            const detailView = document.createElement('div');
            detailView.id = `detail-${tabId}`;
            detailView.className = `detail-view`;

            // 画像を1枚ずつ流し込んでいく
            artworkData[tabId].forEach((imgSrc, imgIndex) => {
                // 一覧用のタイルを生成
                listView.innerHTML += `
                    <div class="gallery-item" onclick="showDetailView('detail-${tabId}', ${imgIndex})">
                        <img src="${imgSrc}" alt="作品">
                    </div>
                `;
                // 詳細用のインスタ風パーツを生成
                detailView.innerHTML += `
                    <div class="detail-item" id="img-${tabId}-${imgIndex}">
                        <img src="${imgSrc}" alt="作品">
                    </div>
                `;
            });

            galleryBox.appendChild(listView);
            galleryBox.appendChild(detailView);
        });

        // ==========================================
        // 画面切り替え・スワイプの仕組み（前と同じ！）
        // ==========================================
        let currentTab = 'tab-a'; 
        let isDetailMode = false; 
        let touchStartX = 0;
        let touchStartY = 0;

        function switchTab(tabId) {
            currentTab = tabId;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.list-view').forEach(content => content.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById('list-' + tabId).classList.add('active');
        }

        function showDetailView(detailTabId, imgIndex) {
            isDetailMode = true;
            document.querySelectorAll('.list-view').forEach(content => content.classList.remove('active'));
            document.getElementById('tabs-menu').style.display = 'none';
            document.getElementById('back-btn').style.display = 'block';

            const detailView = document.getElementById(detailTabId);
            detailView.classList.add('active');

            const targetImg = document.getElementById('img-' + detailTabId.replace('detail-', '') + '-' + imgIndex);
            if (targetImg) {
                targetImg.scrollIntoView({ behavior: 'auto', block: 'center' });
            }
        }

        function showListView() {
            isDetailMode = false;
            document.querySelectorAll('.detail-view').forEach(content => content.classList.remove('active'));
            document.getElementById('back-btn').style.display = 'none';
            document.getElementById('tabs-menu').style.display = 'flex';
            document.getElementById('list-' + currentTab).classList.add('active');
        }

        window.addEventListener('touchstart', function(e) {
            if (!isDetailMode) return;
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, {passive: true});

        window.addEventListener('touchend', function(e) {
            if (!isDetailMode) return;
            let touchEndX = e.changedTouches[0].clientX;
            let touchEndY = e.changedTouches[0].clientY;
            let diffX = touchEndX - touchStartX;
            let diffY = touchEndY - touchStartY;
            if (diffX > 50 && Math.abs(diffX) > Math.abs(diffY)) {
                showListView();
            }
        }, {passive: true});
    </script>

</body>
</html>
