<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>とりのポートフォリオ</title>
    <style>
        /* 全体の基本設定 */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #ffffff;
            color: #333333;
            margin: 0;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;  /* 👈 これを追加！画面からはみ出た部分を非表示にして横スクロールを強制ストップさせる魔法の呪文 */
        }

        /* ヘッダー（アイコンとSNS） */
        .header {
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 800px;
            gap: 20px;
            margin-bottom: 30px;
            padding: 0 20px;
            box-sizing: border-box;
        }
        .profile-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #333;
        }
        .profile-info h1 {
            margin: 0 0 5px 0;
            font-size: 18px;
            font-weight: 300;
        }
        .sns-links a {
            margin-right: 15px;
            color: #0066cc;
            text-decoration: none;
            font-size: 13px;
            font-weight: 300;
        }

        /* タブ部分 */
        .tabs-container {
            width: 100%;
            max-width: 800px;
            position: relative;
        }
        .tabs {
            display: flex;
            justify-content: center;
            border-bottom: 2px solid #eeeeee;
            margin-bottom: 20px;
        }
        .tab-btn {
            background: none;
            border: none;
            font-size: 24px;
            padding: 10px 40px;
            cursor: pointer;
            position: relative;
            opacity: 0.4;
            transition: opacity 0.3s;
        }
        .tab-btn.active {
            opacity: 1;
        }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 3px;
            background-color: #000000;
        }

        /* 戻るボタン（詳細モードの時に左上に出す） */
        .back-btn {
            display: none;
            position: absolute;
            left: 20px;
            top: 10px;
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            font-weight: 300;
        }

        /* ギャラリー部分（全体コンテナ） */
        .gallery-container {
            width: 100%;
            max-width: 100%;
        }

        /* ① 一覧モード（タイル状に並ぶ） */
        .list-view {
            display: none;
            gap: 0;
            grid-template-columns: repeat(3, 1fr); /* スマホは横3列 */
        }
        .list-view.active {
            display: grid;
        }
        @media (min-width: 768px) {
            .list-view {
                grid-template-columns: repeat(5, 1fr); /* PCは横5列 */
            }
        }
        .gallery-item {
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            background-color: #f5f5f5;
            cursor: pointer;
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }
        .gallery-item img:hover {
            transform: scale(1.05);
        }

        /* ② 詳細モード（インスタのフィード風：縦1列でオリジナル比率） */
        .detail-view {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        .detail-view.active {
            display: flex;
        }
        .detail-item {
            width: 100%;
            max-width: 600px; /* インスタの画像っぽく見やすい最大幅に制限 */
            margin-bottom: 20px;
            background-color: #ffffff;
        }
        .detail-item img {
            width: 100%;
            height: auto; /* 縦横比をオリジナルに保つ */
            display: block;
        }
    </style>
</head>
<body>

    <div class="header">
        <img class="profile-icon" src="アイコン用アメタマJPG.JPG" alt="アイコン">
        <div class="profile-info">
            <h1>とり</h1>
            <div class="sns-links">
                <a href="#" target="_blank">X: @ID</a>
                <a href="#" target="_blank">pixiv: ID</a>
            </div>
        </div>
    </div>

    <div class="tabs-container">
        <button id="back-btn" class="back-btn" onclick="showListView()">back</button>
        <div id="tabs-menu" class="tabs">
            <button class="tab-btn active" onclick="switchTab('tab-a')">🖤</button>
            <button class="tab-btn" onclick="switchTab('tab-b')">🎨</button>
            <button class="tab-btn" onclick="switchTab('tab-c')">🔪</button>
        </div>
    </div>

    <div class="gallery-container">

        <div id="list-tab-a" class="list-view active">
            <div class="gallery-item" onclick="showDetailView('detail-tab-a', 0)"><img src="patirisutohakama.PNG" alt="作品"></div>
            <div class="gallery-item" onclick="showDetailView('detail-tab-a', 1)"><img src="pickp_nuoh.JPG" alt="作品"></div>
        </div>

        <div id="list-tab-b" class="list-view">
            <div class="gallery-item" onclick="showDetailView('detail-tab-b', 0)"><img src="sg_sketch.png" alt="作品"></div>
            <div class="gallery-item" onclick="showDetailView('detail-tab-b', 1)"><img src="水濡れ乾.PNG" alt="作品"></div>
        </div>

        <div id="list-tab-c" class="list-view">
            <div class="gallery-item" onclick="showDetailView('detail-tab-c', 0)"><img src="手持ち燭台と夜.jpg" alt="作品"></div>
            <div class="gallery-item" onclick="showDetailView('detail-tab-c', 1)"><img src="工場夜景とモクロー.JPG" alt="作品"></div>
        </div>


        <div id="detail-tab-a" class="detail-view">
            <div class="detail-item" id="img-tab-a-0"><img src="patirisutohakama.PNG" alt="作品"></div>
            <div class="detail-item" id="img-tab-a-1"><img src="pickp_nuoh.JPG" alt="作品"></div>
        </div>

        <div id="detail-tab-b" class="detail-view">
            <div class="detail-item" id="img-tab-b-0"><img src="sg_sketch.png" alt="作品"></div>
            <div class="detail-item" id="img-tab-b-1"><img src="水濡れ乾.PNG" alt="作品"></div>
        </div>

        <div id="detail-tab-c" class="detail-view">
            <div class="detail-item" id="img-tab-c-0"><img src="手持ち燭台と夜.jpg" alt="作品"></div>
            <div class="detail-item" id="img-tab-c-1"><img src="工場夜景とモクロー.JPG" alt="作品"></div>
        </div>

    </div>

    <script>
        let currentTab = 'tab-a'; // 今どっちのタブにいるかを記憶

        // タブを切り替える（一覧モードのとき用）
        function switchTab(tabId) {
            currentTab = tabId;
            
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.list-view').forEach(content => content.classList.remove('active'));

            const clickedBtn = event.currentTarget;
            clickedBtn.classList.add('active');

            document.getElementById('list-' + tabId).classList.add('active');
        }

        // 詳細モード（インスタ風）に切り替える
        function showDetailView(detailTabId, imgIndex) {
            // 一覧を全部非表示にする
            document.querySelectorAll('.list-view').forEach(content => content.classList.remove('active'));
            // タブメニューを消して、戻るボタンを出す
            document.getElementById('tabs-menu').style.display = 'none';
            document.getElementById('back-btn').style.display = 'block';

            // 指定された作風の詳細ギャラリーを表示する
            const detailView = document.getElementById(detailTabId);
            detailView.classList.add('active');

            // クリックした画像の位置まで自動スクロールする
            const targetImg = document.getElementById('img-' + detailTabId.replace('detail-', '') + '-' + imgIndex);
            if (targetImg) {
                targetImg.scrollIntoView({ behavior: 'auto', block: 'center' });
            }
        }

        // 一覧モードに戻る
        function showListView() {
            // 詳細モードを全部非表示にする
            document.querySelectorAll('.detail-view').forEach(content => content.classList.remove('active'));
            // 戻るボタンを消して、タブメニューを出す
            document.getElementById('back-btn').style.display = 'none';
            document.getElementById('tabs-menu').style.display = 'flex';

            // 元いたタブの一覧モードを表示する
            document.getElementById('list-' + currentTab).classList.add('active');
        }
    </script>

</body>
</html>
