<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>とりのポートフォリオ</title>
    <style>
        /* 全体の基本設定 */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #ffffff;
            color: #333333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ヘッダー（アイコンとSNS） */
        .header {
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 800px;
            gap: 20px;
            margin-bottom: 30px;
        }
        .profile-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #333;
        }
        .profile-info h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
        }
        .sns-links a {
            margin-right: 15px;
            color: #0066cc;
            text-decoration: none;
            font-weight: bold;
        }

        /* タブ部分 */
        .tabs {
            display: flex;
            justify-content: center;
            width: 100%;
            max-width: 800px;
            border-bottom: 2px solid #eeeeee;
            margin-bottom: 20px;
        }
        .tab-btn {
            background: none;
            border: none;
            font-size: 24px;
            padding: 10px 40px;
            cursor: pointer;
            position: relative;
            opacity: 0.4;
            transition: opacity 0.3s;
        }
        .tab-btn.active {
            opacity: 1;
        }
        /* 選択中のバナー目印（下線） */
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 3px;
            background-color: #000000;
        }

        /* ギャラリー部分（2x4などのタイル並び） */
        .gallery-container {
            width: 100%;
            max-width: 800px;
        }
        .gallery-content {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }
        .gallery-content.active {
            display: grid;
        }
        .gallery-item {
            width: 100%;
            aspect-ratio: 1 / 1; /* 正方形にする設定 */
            overflow: hidden;
            background-color: #f5f5f5;
            border-radius: 4px;
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 自動で中央を切り抜いて正方形に収める */
            transition: transform 0.3s;
        }
        .gallery-item img:hover {
            transform: scale(1.05); /* マウスを載せたときに少し大きく */
        }
    </style>
</head>
<body>

    <div class="header">
        <img class="profile-icon" src="アイコン用アメタマJPG.JPG" alt="アイコン">
        <div class="profile-info">
            <h1>とり</h1>
            <div class="sns-links">
                <a href="#" target="_blank">X: @ID</a>
                <a href="#" target="_blank">pixiv: ID</a>
            </div>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('tab-a')">🖤</button>
        <button class="tab-btn" onclick="switchTab('tab-b')">🎨</button>
        <button class="tab-btn" onclick="switchTab('tab-c')">🔪</button>
    </div>

    <div class="gallery-container">
        <div id="tab-a" class="gallery-content active">
            <div class="gallery-item"><img src="ヌオーを持ち上げる.JPG" alt="作品"></div>
            <div class="gallery-item"><img src="パチリスと袴.PNG" alt="作品"></div>
        </div>

        <div id="tab-b" class="gallery-content">
            <div class="gallery-item"><img src="sg_sketch.png" alt="作品"></div>
            <div class="gallery-item"><img src="水濡れ乾.PNG" alt="作品"></div>
        </div>

        <div id="tab-c" class="gallery-content">
            <div class="gallery-item"><img src="手持ち燭台と夜.jpg" alt="作品"></div>
            <div class="gallery-item"><img src="工場夜景とモクロー.JPG" alt="作品"></div>
        </div>
    </div>

    <script>
        function switchTab(tabId) {
            // すべてのタブボタンから active クラスを消す
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            // すべてのギャラリーコンテンツを非表示にする
            document.querySelectorAll('.gallery-content').forEach(content => content.classList.remove('active'));

            // クリックされたタブボタンをアクティブにする
            // イベントを発生させたボタンを探してactiveをつける
            const clickedBtn = event.currentTarget;
            clickedBtn.classList.add('active');

            // 対応するギャラリーを表示する
            //document.getElementById(tabId).add('active');
            document.getElementById(tabId).classList.add('active');
        }
    </script>

</body>
</html>
