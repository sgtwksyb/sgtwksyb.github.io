<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>アーカイブ</title>
    <style>
        /* ==========================================
           基本設定（ライトモード用）
           ========================================== */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #ffffff;
            color: #333333;
            margin: 0;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        /* ヘッダー */
        .header {
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 800px;
            gap: 20px;
            margin-bottom: 30px;
            padding: 0 20px;
            box-sizing: border-box;
        }
        .profile-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 0px solid #333;
        }
        .profile-info h1 {
            margin: 0 0 5px 0;
            font-size: 18px;
            font-weight: 300;
        }
        .sns-links a {
            margin-right: 15px;
            color: #0066cc;
            text-decoration: none;
            font-size: 13px;
            font-weight: 300;
        }

        /* タブ・ボタン共通 */
        .tabs-container {
            width: 100%;
            max-width: 800px;
            position: relative;
        }
        .tabs {
            display: flex;
            justify-content: center;
            border-bottom: 0px solid #eeeeee;
            margin-bottom: 20px;
        }
        .tab-btn {
            background: none;
            border: none;
            font-size: 24px;
            padding: 10px 20px;     /* 👈 スマホ用に左右の余白を40pxから20pxに縮めて画面内に収める */
            flex-grow: 1;           /* 👈 4つのボタンが画面幅に等間隔できれいに広がるように設定 */
            max-width: 100px;       /* ボタンが広がりすぎないように制限 */
            cursor: pointer;
            position: relative;
            opacity: 0.4;
            transition: opacity 0.3s;
        }
        .tab-btn.active {
            opacity: 1;
        }

        /* PCやタブレットなど、画面が広い時は少し余裕を持たせる */
        @media (min-width: 768px) {
            .tab-btn {
                padding: 10px 40px;
                flex-grow: 0;
            }
        }

        /* 戻るボタン（画面上部に固定） */
        .back-btn {
            display: none;
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.95);
            border: none;
            border-bottom: 1px solid #eeeeee;
            font-size: 16px;
            cursor: pointer;
            font-weight: 300;
            padding: 15px 20px;
            text-align: left;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            color: #333333;
        }

        /* ギャラリー部分 */
        .gallery-container {
            width: 100%;
            max-width: 100%;
        }

        /* ① 一覧モード */
        .list-view {
            display: none;
            gap: 0;
            grid-template-columns: repeat(3, 1fr);
        }
        .list-view.active {
            display: grid;
        }
        @media (min-width: 768px) {
            .list-view {
                grid-template-columns: repeat(5, 1fr);
            }
        }
        .gallery-item {
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            background-color: #f5f5f5;
            cursor: pointer;
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }
        .gallery-item img:hover {
            transform: scale(1.05);
        }

        /* ② 詳細モード */
        .detail-view {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding-top: 50px;
        }
        .detail-view.active {
            display: flex;
        }
        .detail-item {
            width: 100%;
            max-width: 600px;
            margin-bottom: 20px;
            background-color: #ffffff;
        }
        .detail-item img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* ==========================================
           ダークモード
           ========================================== */
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #000000;
                color: #ffffff;
            }

            .sns-links a {
                color: #66b3ff;
            }

            .back-btn {
                background-color: rgba(0, 0, 0, 0.95);
                border-bottom: 1px solid #333333;
                color: #ffffff;
                box-shadow: 0 2px 5px rgba(255,255,255,0.05);
            }

            .gallery-item {
                background-color: #1a1a1a;
            }

            .detail-item {
                background-color: #000000;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <img class="profile-icon" src="アイコン用アメタマJPG.JPG" alt="アイコン">
        <div class="profile-info">
            <h1>とり</h1>
            <div class="sns-links">
                <a href="#" target="_blank">X: @ID</a>
                <a href="#" target="_blank">pixiv: ID</a>
            </div>
        </div>
    </div>

    <div class="tabs-container">
        <button id="back-btn" class="back-btn" onclick="showListView()">← back</button>
        <div id="tabs-menu" class="tabs">
            <button class="tab-btn active" onclick="switchTab('tab-a')">🧸</button>
            <button class="tab-btn" onclick="switchTab('tab-b')">🎨</button>
            <button class="tab-btn" onclick="switchTab('tab-c')">🔪</button>
            <button class="tab-btn" onclick="switchTab('tab-d')">🗒️</button>
        </div>
    </div>

    <div class="gallery-container" id="gallery-box"></div>

    <script>
        // ==========================================
        // 画像データ（4つ目のタブ 'tab-d' を追加！）
        // ==========================================
        const artworkData = {
            'tab-a': [
                'patirisutohakama.PNG',
                'pickp_nuoh.JPG'
            ],
            'tab-b': [
                'sg_sketch.png',
                '水濡れ乾.PNG'
            ],
            'tab-c': [
                'IMG_7589（中）.jpeg',
                'IMG_7592（中）.jpeg',
                'IMG_7603（中）.jpeg',
                'IMG_7606（中）.jpeg',
                'IMG_7608（中）.jpeg',
                'IMG_7609（中）.jpeg',
                'IMG_7610（中）.jpeg',
                'IMG_7611（中）.jpeg',
                'IMG_7612（中）.jpeg',
                'IMG_7613（中）.jpeg',
                'IMG_7614（中）.jpeg',
                'IMG_7615（中）.jpeg',
                'IMG_7616（中）.jpeg',
                'IMG_7617（中）.jpeg',
                'IMG_7618（中）.jpeg',
                'IMG_7619（中）.jpeg',
                'IMG_7620（中）.jpeg',
                'IMG_7621（中）.jpeg',
                'IMG_7622（中）.jpeg',
                'IMG_7623（中）.jpeg',
                'IMG_7624（中）.jpeg',
                'IMG_7625（中）.jpeg',
                'IMG_7626（中）.jpeg',
                'IMG_7627（中）.jpeg',
                'IMG_7628（中）.jpeg',
                'IMG_7629（中）.jpeg',
                'IMG_7630（中）.jpeg',
                'IMG_7632（中）.jpeg',
                'IMG_7633（中）.jpeg',
                'IMG_7634（中）.jpeg',
                'IMG_7635（中）.jpeg',
                'IMG_7638（中）.jpeg',
                'IMG_7643（中）.jpeg',
                'IMG_7644（中）.jpeg',
                'IMG_7646（中）.jpeg',
                'IMG_7647（中）.jpeg',
                '無題1221_20260614171554（中）.jpeg',
                '無題1292_20260614171817（中）.jpeg',
                '無題1353_20260614171502（中）.jpeg',
                '無題1366_20260614173816（中）.jpeg',
                '無題1385_20260614172006（中）.jpeg',
                '無題1602_20260614171950（中）.jpeg',
                '無題1715_20260614172437（中）.jpeg',
                '無題1845_20260614172104（中）.jpeg',
                '無題1847_20260614172501（中）.jpeg',
                '無題1905_20260614172521（中）.jpeg',
                '無題1909_20260614172307（中）.jpeg',
                '無題1961_20260614172718（中）.jpeg',
                '無題2040_20260614172745（中）.jpeg'
            ],
            'tab-d': [
                // 🗒️
            ]
        };

        const galleryBox = document.getElementById('gallery-box');
        
        Object.keys(artworkData).forEach((tabId, tabIndex) => {
            const isFirst = tabIndex === 0 ? 'active' : '';

            const listView = document.createElement('div');
            listView.id = `list-${tabId}`;
            listView.className = `list-view ${isFirst}`;

            const detailView = document.createElement('div');
            detailView.id = `detail-${tabId}`;
            detailView.className = `detail-view`;

            artworkData[tabId].forEach((imgSrc, imgIndex) => {
                listView.innerHTML += `
                    <div class="gallery-item" onclick="showDetailView('detail-${tabId}', ${imgIndex})">
                        <img src="${imgSrc}" alt="作品">
                    </div>
                `;
                detailView.innerHTML += `
                    <div class="detail-item" id="img-${tabId}-${imgIndex}">
                        <img src="${imgSrc}" alt="作品">
                    </div>
                `;
            });

            galleryBox.appendChild(listView);
            galleryBox.appendChild(detailView);
        });

        let currentTab = 'tab-a'; 
        let isDetailMode = false; 
        let touchStartX = 0;
        let touchStartY = 0;

        function switchTab(tabId) {
            currentTab = tabId;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.list-view').forEach(content => content.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById('list-' + tabId).classList.add('active');
        }

        function showDetailView(detailTabId, imgIndex) {
            isDetailMode = true;
            document.querySelectorAll('.list-view').forEach(content => content.classList.remove('active'));
            document.getElementById('tabs-menu').style.display = 'none';
            document.getElementById('back-btn').style.display = 'block';

            const detailView = document.getElementById(detailTabId);
            detailView.classList.add('active');

            const targetImg = document.getElementById('img-' + detailTabId.replace('detail-', '') + '-' + imgIndex);
            if (targetImg) {
                targetImg.scrollIntoView({ behavior: 'auto', block: 'center' });
            }
        }

        function showListView() {
            isDetailMode = false;
            document.querySelectorAll('.detail-view').forEach(content => content.classList.remove('active'));
            document.getElementById('back-btn').style.display = 'none';
            document.getElementById('tabs-menu').style.display = 'flex';
            document.getElementById('list-' + currentTab).classList.add('active');
        }

        window.addEventListener('touchstart', function(e) {
            if (!isDetailMode) return;
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, {passive: true});

        window.addEventListener('touchend', function(e) {
            if (!isDetailMode) return;
            let touchEndX = e.changedTouches[0].clientX;
            let touchEndY = e.changedTouches[0].clientY;
            let diffX = touchEndX - touchStartX;
            let diffY = touchEndY - touchStartY;
            if (diffX > 50 && Math.abs(diffX) > Math.abs(diffY)) {
                showListView();
            }
        }, {passive: true});
    </script>

</body>
</html>
